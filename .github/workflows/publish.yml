name: Publish (NuGet + GitHub Release)

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  id-token: write   # required for NuGet OIDC trusted publishing
  contents: write   # required to create the GitHub Release

jobs:
  build-pack-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0   # MinVer needs full history + tags

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore, build, test
        run: |
          dotnet restore StyloIssues.sln
          dotnet build StyloIssues.sln --configuration Release --no-restore
          dotnet test StyloIssues.sln --configuration Release --no-build --verbosity normal

      - name: Pack (Abstractions, core, UI)
        run: |
          dotnet pack src/StyloIssues.Abstractions/StyloIssues.Abstractions.csproj -c Release --no-build -o ./artifacts
          dotnet pack src/StyloIssues/StyloIssues.csproj -c Release --no-build -o ./artifacts
          dotnet pack src/StyloIssues.UI/StyloIssues.UI.csproj -c Release --no-build -o ./artifacts

      # NuGet OIDC trusted publishing. REQUIRES a Trusted Publisher policy for
      # scottgal/styloissues (user: mostlylucid) registered on nuget.org before
      # this step can succeed. Set that up, then push a v*.*.* tag.
      # https://learn.microsoft.com/nuget/nuget-org/trusted-publishing
      - name: Login to NuGet (OIDC)
        id: nuget_login
        uses: NuGet/login@d22cc5f58ff5b88bf9bd452535b4335137e24544 # v1
        with:
          user: 'mostlylucid'

      - name: Push to NuGet
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --api-key ${{ steps.nuget_login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Upload package artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nuget-packages
          path: ./artifacts/*.nupkg

      # GitHub Release with auto-generated notes = the changelog for the tag.
      - name: GitHub Release (auto-generated changelog)
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
        with:
          generate_release_notes: true
          files: ./artifacts/*.nupkg
